<div class="relative">
  <button
    type="button"
    class="group flex h-11 w-[220px] items-center gap-3 rounded-lg bg-surface-container-high px-4 text-left transition-colors duration-200 hover:bg-surface-bright"
    (click)="toggle()">
    <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary/10 text-primary shadow-[inset_0_0_0_1px_rgba(0,82,255,0.16)]">
      <span class="material-symbols-outlined text-base">calendar_month</span>
    </div>

    <p class="min-w-0 flex-1 truncate text-sm font-bold leading-none text-white">{{ triggerLabel() }}</p>

    <span class="material-symbols-outlined text-sm text-on-surface-variant transition-transform duration-200" [class.rotate-180]="isOpen()">expand_more</span>
  </button>

  @if (isOpen()) {
    <div class="absolute left-0 top-[calc(100%+0.9rem)] z-[70] w-[348px] overflow-hidden rounded-[28px] border border-white/10 bg-[#171a20]/95 shadow-[0_35px_90px_rgba(0,0,0,0.58)] backdrop-blur-xl">
      <div class="relative p-4">
        <div class="pointer-events-none absolute left-6 right-6 top-0 h-24 rounded-full bg-primary/12 blur-3xl"></div>

        <div class="relative rounded-[24px] border border-white/6 bg-white/[0.03] p-4 shadow-[inset_0_1px_0_rgba(255,255,255,0.03)]">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="text-[10px] font-bold uppercase tracking-[0.24em] text-primary">{{ 'calendar.datePickerTitle' | translate }}</p>
              <h4 class="mt-2 text-lg font-black text-white">{{ monthLabel() }}</h4>
              <p class="mt-1 text-xs leading-relaxed text-on-surface-variant">{{ selectedDateLabel() }}</p>
            </div>

            <button
              type="button"
              class="flex h-10 w-10 items-center justify-center rounded-2xl border border-white/8 bg-white/[0.03] text-on-surface-variant transition-colors hover:bg-white/8 hover:text-white"
              (click)="close()">
              <span class="material-symbols-outlined text-lg">close</span>
            </button>
          </div>

          <div class="mt-5 flex items-center justify-between rounded-2xl border border-white/6 bg-surface-container-high px-2 py-2">
            <button
              type="button"
              class="flex h-10 w-10 items-center justify-center rounded-xl text-on-surface-variant transition-colors hover:bg-white/8 hover:text-white"
              (click)="showPreviousMonth()">
              <span class="material-symbols-outlined">chevron_left</span>
            </button>

            <p class="text-sm font-bold text-white">{{ monthLabel() }}</p>

            <button
              type="button"
              class="flex h-10 w-10 items-center justify-center rounded-xl text-on-surface-variant transition-colors hover:bg-white/8 hover:text-white"
              (click)="showNextMonth()">
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
          </div>

          <div class="mt-5 grid grid-cols-7 gap-2 text-center">
            @for (weekday of weekdays; track weekday) {
              <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant">{{ weekday | translate }}</span>
            }
          </div>

          <div class="mt-3 grid grid-cols-7 gap-2">
            @for (day of monthDays(); track day.isoDate) {
              <button
                type="button"
                [class]="dayButtonClass(day)"
                (click)="selectDay(day)">
                <span>{{ day.dayNumber }}</span>
                @if (day.isToday && !day.isSelected) {
                  <span class="absolute bottom-1.5 h-1.5 w-1.5 rounded-full bg-primary"></span>
                }
              </button>
            }
          </div>
        </div>
      </div>
    </div>
  }
</div>
