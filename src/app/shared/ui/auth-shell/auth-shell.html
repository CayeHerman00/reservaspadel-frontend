<div class="fixed inset-0 z-0 overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_rgba(0,82,255,0.08)_0%,_transparent_50%)]"></div>
  <div class="absolute top-[-10%] left-[-10%] h-[40%] w-[40%] rounded-full bg-primary-container/10 blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] h-[40%] w-[40%] rounded-full bg-tertiary/10 blur-[120px]"></div>
</div>

<main class="relative z-10 flex min-h-screen items-center justify-center p-4 lg:p-6" [class.overflow-hidden]="compact()">
  <div
    class="grid w-full max-w-[1000px] grid-cols-1 overflow-hidden rounded-xl border border-outline-variant/15 shadow-[0_20px_40px_rgba(0,0,0,0.6)] glass-panel lg:grid-cols-2"
    [class.max-h-[calc(100vh-2rem)]]="compact()"
    [class.lg:max-h-[calc(100vh-3rem)]]="compact()">

    <div class="relative hidden flex-col justify-between overflow-hidden bg-surface-container-low p-10 lg:flex" [class.p-12]="!compact()">
      <div>
        <h1 class="mb-2 font-headline text-3xl font-black tracking-tighter text-white">{{ 'login.brandTitle' | translate }}</h1>
        <p class="font-medium text-on-surface-variant">{{ 'login.brandSubtitle' | translate }}</p>
      </div>

      <div class="pointer-events-none absolute inset-0 flex items-center justify-center">
        <div class="relative mt-32">
          <div class="ball-shadow mx-auto"></div>
          <div class="padel-ball-bounce absolute bottom-4 left-1/2 -translate-x-1/2">
            <div class="padel-ball-realistic" aria-hidden="true"></div>
          </div>
        </div>
      </div>

      <div class="relative z-20">
        <div class="mb-4 flex items-center gap-3">
          <span class="h-[2px] w-8 bg-primary-container"></span>
          <span class="text-xs font-bold uppercase tracking-widest text-primary-fixed-dim">{{ 'login.velocityCourt' | translate }}</span>
        </div>
        <blockquote class="text-lg font-light italic text-on-surface/80">{{ 'login.quote' | translate }}</blockquote>
      </div>

      <div class="absolute right-0 top-0 p-8 opacity-10">
        <span class="material-symbols-outlined text-9xl">sports_tennis</span>
      </div>
    </div>

    <div class="flex flex-col bg-surface-container p-6 lg:p-8" [class.p-8]="!compact()" [class.lg:p-12]="!compact()">
      <div class="mb-4">
        <a class="inline-flex items-center gap-2 text-xs font-bold uppercase tracking-[0.2em] text-on-surface-variant transition-colors hover:text-white" [routerLink]="appRoutes.home">
          <span class="material-symbols-outlined text-base">arrow_back</span>
          {{ 'common.backToMainMenu' | translate }}
        </a>
      </div>

      <div class="mb-6 flex gap-8 border-b border-outline-variant/10" [class.mb-10]="!compact()">
        <button
          class="pb-4 text-sm font-bold tracking-wider transition-all"
          [class.border-b-2]="activeTab() === 'login'"
          [class.border-primary-container]="activeTab() === 'login'"
          [class.text-white]="activeTab() === 'login'"
          [class.text-on-surface-variant]="activeTab() !== 'login'"
          [routerLink]="appRoutes.login">
          {{ 'login.tabLogin' | translate }}
        </button>
        <button
          class="pb-4 text-sm font-bold tracking-wider transition-all"
          [class.border-b-2]="activeTab() === 'register'"
          [class.border-primary-container]="activeTab() === 'register'"
          [class.text-white]="activeTab() === 'register'"
          [class.text-on-surface-variant]="activeTab() !== 'register'"
          [routerLink]="appRoutes.register">
          {{ 'login.tabSignup' | translate }}
        </button>
      </div>

      <div class="mb-6" [class.mb-8]="!compact()">
        <h2 class="mb-2 font-headline text-3xl font-bold text-white" [class.text-[2rem]]="compact()">{{ titleKey() | translate }}</h2>
        <p class="text-sm text-on-surface-variant">{{ subtitleKey() | translate }}</p>
      </div>

      <ng-content></ng-content>

      <div class="mt-auto flex justify-center pt-5" [class.pt-8]="!compact()">
        <button type="button" class="flex items-center gap-2 text-xs font-medium text-on-surface-variant transition-colors hover:text-primary" (click)="supportClick.emit()">
          <span class="material-symbols-outlined text-sm">contact_support</span>
          {{ 'login.contactSupport' | translate }}
        </button>
      </div>
    </div>
  </div>

  <div class="pointer-events-none fixed bottom-12 right-12 hidden opacity-20 xl:block">
    <h3 class="select-none font-headline text-9xl font-black leading-none text-white">PK</h3>
  </div>
</main>
