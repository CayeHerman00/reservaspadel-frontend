<footer class="border-t border-outline-variant/15 pt-12">
  <div class="flex flex-col items-center justify-between gap-8 md:flex-row">
    <div class="flex flex-col gap-2">
      <span class="text-lg font-black text-white font-headline tracking-tighter">{{ 'common.brand' | translate }}</span>
      <p class="font-body text-[10px] uppercase tracking-[0.2em] text-on-surface-variant">&copy; 2024 {{ 'footer.kineticExperience' | translate }}</p>
    </div>
    <div class="flex gap-8">
      @for (link of links; track link.route) {
        <a
          class="font-body text-xs uppercase tracking-widest transition-all opacity-80 hover:opacity-100 hover:text-white hover:underline underline-offset-4"
          [class.text-[#caf300]]="link.accent"
          [class.text-[#c3c5d9]]="!link.accent"
          [routerLink]="link.route">
          {{ link.labelKey | translate }}
        </a>
      }
    </div>
  </div>
</footer>
