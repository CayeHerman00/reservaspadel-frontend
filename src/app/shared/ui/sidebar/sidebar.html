<aside class="sidebar-root h-screen w-64 fixed left-0 top-0 bg-[#1a1c1f] flex flex-col p-6 gap-2 z-50 transition-all duration-300" [class.sidebar-collapsed]="collapsed()">
  <div class="flex items-center justify-between mb-8 sidebar-header">
    <div class="px-4 sidebar-header-text">
      <h1 class="text-xl font-bold text-white font-headline tracking-tighter">{{ 'common.brand' | translate }}</h1>
      <p class="text-xs text-on-surface-variant opacity-70 mt-1 uppercase tracking-widest">{{ 'common.clubName' | translate }}</p>
    </div>
    <button class="toggle-btn w-8 h-8 rounded-full bg-[#0052FF] flex items-center justify-center text-white cursor-pointer transition-transform duration-300" (click)="toggleCollapsed()">
      <span class="material-symbols-outlined text-sm">chevron_left</span>
    </button>
  </div>

  <nav class="flex-1 space-y-2">
    <a [routerLink]="appRoutes.dashboard" [class]="navClass('home')">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="nav-text">{{ 'sidebar.home' | translate }}</span>
    </a>
    <a [routerLink]="courtsRoute()" [class]="navClass('courts')">
      <span class="material-symbols-outlined">layers</span>
      <span class="nav-text">{{ courtsLabelKey() | translate }}</span>
    </a>
    <a [routerLink]="appRoutes.calendar" [class]="navClass('calendar')">
      <span class="material-symbols-outlined">calendar_today</span>
      <span class="nav-text">{{ 'sidebar.calendar' | translate }}</span>
    </a>
    <button class="w-full text-left flex items-center gap-3 text-[#c3c5d9] px-4 py-3 hover:bg-[#37393d] hover:translate-x-1 rounded-lg font-body font-medium text-sm transition-all active:scale-98 cursor-pointer" (click)="settingsClick.emit()">
      <span class="material-symbols-outlined">settings</span>
      <span class="nav-text">{{ 'sidebar.settings' | translate }}</span>
    </button>
  </nav>

  <div class="mt-auto space-y-4 pt-6 border-t border-outline-variant/15 sidebar-footer-content">
    <button class="new-reservation-btn kinetic-gradient w-full py-3 rounded-lg font-bold text-white text-sm shadow-xl flex items-center justify-center gap-2 transition-transform active:scale-95" (click)="primaryActionClick.emit()">
      <span class="material-symbols-outlined text-sm">{{ primaryActionIcon() }}</span>
      <span class="sidebar-cta-label">{{ primaryActionLabelKey() | translate }}</span>
    </button>
    <div class="space-y-1">
      <button class="w-full text-left flex items-center gap-3 text-[#c3c5d9] px-4 py-2 hover:bg-[#37393d] hover:translate-x-1 rounded-lg text-xs transition-all cursor-pointer" (click)="supportClick.emit()">
        <span class="material-symbols-outlined text-lg">help</span>
        <span class="nav-text">{{ 'common.support' | translate }}</span>
      </button>
      <button class="w-full text-left flex items-center gap-3 text-error/80 px-4 py-2 hover:bg-error-container/20 hover:translate-x-1 rounded-lg text-xs transition-all cursor-pointer" (click)="logoutClick.emit()">
        <span class="material-symbols-outlined text-lg">logout</span>
        <span class="nav-text">{{ 'common.logout' | translate }}</span>
      </button>
    </div>
  </div>
</aside>
