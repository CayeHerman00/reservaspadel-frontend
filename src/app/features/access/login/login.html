<app-auth-shell
  activeTab="login"
  titleKey="login.welcome"
  subtitleKey="login.subtitle"
  (supportClick)="onContactSupport()">
  <form class="space-y-6" (ngSubmit)="submitLogin()">
    <div class="space-y-2">
      <label class="ml-1 block text-xs font-bold uppercase tracking-tighter text-on-surface-variant">{{ 'login.username' | translate }}</label>
      <div class="group relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors group-focus-within:text-primary">person</span>
        <input
          [(ngModel)]="username"
          name="username"
          class="w-full rounded-lg bg-surface-container-lowest py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 transition-all duration-300 focus:ring-1 focus:ring-primary"
          [class.ring-1]="usernameError"
          [class.ring-red-500]="usernameError"
          [placeholder]="'login.usernamePlaceholder' | translate"
          type="text" />
      </div>
    </div>

    <div class="space-y-2">
      <div class="flex items-center justify-between px-1">
        <label class="block text-xs font-bold uppercase tracking-tighter text-on-surface-variant">{{ 'login.password' | translate }}</label>
        <button type="button" class="cursor-pointer text-[10px] font-bold uppercase text-primary-fixed-dim transition-colors hover:text-white" (click)="requestPasswordRecovery()">
          {{ 'login.forgot' | translate }}
        </button>
      </div>
      <div class="group relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors group-focus-within:text-primary">lock</span>
        <input
          [(ngModel)]="password"
          name="password"
          class="w-full rounded-lg bg-surface-container-lowest py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 transition-all duration-300 focus:ring-1 focus:ring-primary"
          [class.ring-1]="passwordError"
          [class.ring-red-500]="passwordError"
          [placeholder]="'login.passwordPlaceholder' | translate"
          type="password" />
      </div>
    </div>

    <div class="flex items-center gap-2 px-1">
      <input class="h-4 w-4 cursor-pointer rounded bg-surface-container-lowest text-primary-container transition-all focus:ring-0 focus:ring-offset-0" id="remember" type="checkbox" />
      <label class="cursor-pointer select-none text-xs text-on-surface-variant" for="remember">{{ 'login.remember' | translate }}</label>
    </div>

    <button
      type="submit"
      [disabled]="isSubmitting"
      class="w-full rounded-lg py-4 text-sm font-bold uppercase tracking-widest text-white signature-gradient shadow-[0_10px_20px_rgba(0,82,255,0.2)] transition-all duration-300 hover:shadow-[0_15px_30px_rgba(0,82,255,0.4)] active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-60">
      {{ 'login.button' | translate }}
    </button>
  </form>
</app-auth-shell>
